{{ define "main" }}
  <article>
    {{ with .Params.cover }}{{ with $.Resources.GetMatch . }}
      <img src="{{ .RelPermalink }}" alt="{{ $.Title }}" class="w-full rounded-lg mb-6">
    {{ end }}{{ end }}
    <h1 class="text-3xl font-bold tracking-tight mb-2">{{ .Title }}</h1>
    <div class="text-sm text-gray-500 mb-8 flex flex-wrap items-center gap-x-3 gap-y-1">
      {{ with .Date }}<time datetime="{{ .Format "2006-01-02" }}">{{ .Format "2006.01.02" }}</time>{{ end }}
      {{ with .Params.tags }}
        <span class="flex flex-wrap gap-2">
          {{ range . }}<a href="{{ (printf "/tags/%s/" (. | urlize)) | relURL }}" class="text-blue-600 hover:underline">#{{ . }}</a>{{ end }}
        </span>
      {{ end }}
    </div>
    <div class="post-content">
      {{ .Content }}
    </div>
  </article>
{{ end }}
