{{ define "main" }}
  <h1 class="text-2xl font-bold tracking-tight mb-8">{{ .Title }}</h1>
  {{ with .Content }}<div class="post-content mb-8">{{ . }}</div>{{ end }}
  <ul class="space-y-8">
    {{ range .Pages }}
      <li>
        <a href="{{ .RelPermalink }}" class="block group">
          <h2 class="text-lg font-medium group-hover:underline">{{ .Title }}</h2>
          {{ with .Date }}<div class="text-sm text-gray-500 mt-1"><time datetime="{{ .Format "2006-01-02" }}">{{ .Format "2006.01.02" }}</time></div>{{ end }}
          {{ with .Description }}<p class="text-gray-600 mt-2">{{ . }}</p>{{ end }}
        </a>
      </li>
    {{ end }}
  </ul>
{{ end }}
